services:
  - type: web
    name: libratech-management
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will enter this manually in Render
      - key: PYTHONPATH
        value: .
