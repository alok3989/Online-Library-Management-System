services:
  - type: web
    name: libratech-management
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false 
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel URL after deploying the frontend
      - key: DATABASE_URL
        fromDatabase:
          name: libratech-db
          property: connectionString
      - key: PYTHONPATH
        value: .

databases:
  - name: libratech-db
    plan: free
